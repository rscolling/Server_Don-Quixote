<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="/manifest.json">
  <title>Call BOB</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100dvh;
      height: 100vh; /* fallback */
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #btn-area {
      padding-top: 3rem;
      padding-bottom: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #status {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      min-height: 1.5rem;
      text-align: center;
      padding: 0 1rem;
      color: #8888aa;
    }
    #call-btn {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: none;
      background: #16213e;
      color: #4ecca3;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(78, 204, 163, 0.2);
    }
    #call-btn:active { transform: scale(0.95); }
    #call-btn.listening {
      background: #4ecca3;
      color: #1a1a2e;
      box-shadow: 0 0 60px rgba(78, 204, 163, 0.5);
      animation: pulse 1.5s infinite;
    }
    #call-btn.processing {
      background: #e2b714;
      color: #1a1a2e;
      box-shadow: 0 0 40px rgba(226, 183, 20, 0.4);
    }
    #call-btn.speaking {
      background: #0f3460;
      color: #4ecca3;
      box-shadow: 0 0 50px rgba(78, 204, 163, 0.3);
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    #transcript-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      background: rgba(0,0,0,0.3);
    }
    .msg { padding: 0.5rem 0; font-size: 0.9rem; }
    .msg.you { color: #4ecca3; }
    .msg.bob { color: #e0e0e0; }
    .msg .label { font-weight: 600; font-size: 0.75rem; text-transform: uppercase; opacity: 0.6; }
    #new-chat {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: none;
      border: 1px solid #333;
      color: #666;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #stop-btn {
      position: fixed;
      top: 1rem;
      left: 1rem;
      width: 44px;
      height: 44px;
      background: #cc2222;
      border: 2px solid #ff4444;
      border-radius: 4px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 10px rgba(204, 34, 34, 0.4);
      transition: opacity 0.2s ease;
    }
    #stop-btn:active { transform: scale(0.9); }
    #stop-btn svg {
      width: 22px;
      height: 22px;
    }
  </style>
</head>
<body>
  <button id="stop-btn"><svg viewBox="0 0 100 100"><polygon points="35,2 65,2 98,35 98,65 65,98 35,98 2,65 2,35" fill="#cc2222" stroke="#fff" stroke-width="4"/><text x="50" y="58" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold" font-family="sans-serif">STOP</text></svg></button>
  <button id="new-chat">New Chat</button>
  <div id="btn-area">
    <div id="status">Tap to talk to BOB</div>
    <button id="call-btn">CALL BOB</button>
  </div>
  <div id="transcript-area"></div>

  <script>
    var btn = document.getElementById("call-btn");
    var status = document.getElementById("status");
    var transcripts = document.getElementById("transcript-area");
    var newChatBtn = document.getElementById("new-chat");

    var stopBtn = document.getElementById("stop-btn");

    var ws = null;
    var mediaRecorder = null;
    var audioChunks = [];
    var isListening = false;
    var isSpeaking = false;

    var audioQueue = [];
    var isPlaying = false;
    var currentAudio = null;

    // Browser geolocation
    var userLat = null, userLon = null;
    if ("geolocation" in navigator) {
      navigator.geolocation.getCurrentPosition(
        function(pos) { userLat = pos.coords.latitude; userLon = pos.coords.longitude; },
        function() { /* denied or unavailable — no-op */ },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function getWsUrl() {
      var proto = location.protocol === "https:" ? "wss:" : "ws:";
      return proto + "//" + location.host + "/ws/voice";
    }

    function connect() {
      ws = new WebSocket(getWsUrl());
      ws.binaryType = "arraybuffer";

      ws.onopen = function() {
        status.textContent = "Connected - tap to talk";
        btn.textContent = "CALL BOB";
        // Send browser geolocation if available
        if (userLat !== null && userLon !== null) {
          ws.send(JSON.stringify({ type: "location", lat: userLat, lon: userLon }));
        }
      };

      ws.onmessage = function(event) {
        if (event.data instanceof ArrayBuffer) {
          if (!isSpeaking) return;
          // Collect sentence audio blobs
          audioQueue.push(event.data);
        } else {
          var msg = JSON.parse(event.data);
          if (msg.type === "status") {
            status.textContent = msg.message;
          } else if (msg.type === "transcript") {
            addMessage("You", msg.text, "you");
          } else if (msg.type === "bob_text") {
            addMessage("BOB", msg.text, "bob");
          } else if (msg.type === "audio_start") {
            isSpeaking = true;
            btn.className = "speaking";
            btn.textContent = "BOB";
            stopBtn.style.display = "flex";
            audioQueue = [];
          } else if (msg.type === "audio_end") {
            // All sentence blobs received — combine and play as one
            if (isSpeaking && audioQueue.length > 0) {
              playCombined();
            } else {
              resetToReady();
            }
          } else if (msg.type === "error") {
            status.textContent = "Error: " + msg.message;
            resetToReady();
          }
        }
      };

      ws.onclose = function() {
        status.textContent = "Disconnected - tap to reconnect";
        btn.className = "";
        setTimeout(connect, 3000);
      };

      ws.onerror = function() {
        status.textContent = "Connection error";
      };
    }

    function playCombined() {
      if (audioQueue.length === 0) {
        resetToReady();
        return;
      }
      var blob = new Blob(audioQueue, { type: "audio/mpeg" });
      audioQueue = [];
      isPlaying = true;
      var url = URL.createObjectURL(blob);
      var audio = new Audio(url);
      currentAudio = audio;
      audio.onended = function() {
        URL.revokeObjectURL(url);
        currentAudio = null;
        isPlaying = false;
        resetToReady();
      };
      audio.onerror = function() {
        URL.revokeObjectURL(url);
        currentAudio = null;
        isPlaying = false;
        resetToReady();
      };
      audio.play().catch(function() {
        currentAudio = null;
        isPlaying = false;
        resetToReady();
      });
    }

    function stopSpeaking() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "stop_audio" }));
      }
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
      }
      audioQueue = [];
      isPlaying = false;
      isSpeaking = false;
      resetToReady();
    }

    function resetToReady() {
      isSpeaking = false;
      btn.className = "";
      btn.textContent = "CALL BOB";
      status.textContent = "Tap to talk";
      stopBtn.style.display = "none";
    }

    function addMessage(label, text, cls) {
      var div = document.createElement("div");
      div.className = "msg " + cls;
      div.innerHTML = '<div class="label">' + label + '</div>' + text;
      transcripts.appendChild(div);
      transcripts.scrollTop = transcripts.scrollHeight;
    }

    function startListening() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        connect();
        return;
      }
      navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
        mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm;codecs=opus" });
        audioChunks = [];
        mediaRecorder.ondataavailable = function(e) {
          if (e.data.size > 0) audioChunks.push(e.data);
        };
        mediaRecorder.onstop = function() {
          var audioBlob = new Blob(audioChunks, { type: "audio/webm" });
          audioBlob.arrayBuffer().then(function(buffer) {
            ws.send(buffer);
          });
          stream.getTracks().forEach(function(t) { t.stop(); });
          btn.className = "processing";
          btn.textContent = "...";
        };
        mediaRecorder.start();
        isListening = true;
        btn.className = "listening";
        btn.textContent = "LISTENING";
        status.textContent = "Speak now... tap when done";
      }).catch(function() {
        status.textContent = "Microphone access denied";
      });
    }

    function stopListening() {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        isListening = false;
      }
    }

    btn.addEventListener("click", function() {
      if (isSpeaking) {
        stopSpeaking();
      } else if (isListening) {
        stopListening();
      } else {
        startListening();
      }
    });

    stopBtn.addEventListener("click", function() {
      stopSpeaking();
    });

    newChatBtn.addEventListener("click", function() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "new_session" }));
        transcripts.innerHTML = "";
        status.textContent = "New conversation - tap to talk";
      }
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }

    connect();
  </script>
</body>
</html>
